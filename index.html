<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OASIS — переходим на сайт…</title>
<style>
  body{margin:0;font-family:-apple-system,system-ui,sans-serif;background:linear-gradient(135deg,#0ea5e9,#22d3ee);color:#fff;min-height:100vh;display:grid;place-items:center;text-align:center}
  .box{padding:2rem;max-width:380px}
  h1{font-size:2rem;margin:0 0 .5rem;letter-spacing:.05em}
  p{opacity:.9;margin:0 0 1.5rem;line-height:1.5}
  .spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 1rem}
  @keyframes spin{to{transform:rotate(360deg)}}
  a{color:#fff;text-decoration:underline;font-size:.875rem;opacity:.85}
  .url{margin-top:1rem;font-size:.75rem;opacity:.7;word-break:break-all;font-family:ui-monospace,monospace}
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <h1>OASIS</h1>
  <p id="msg">Открываем сайт…</p>
  <div class="url" id="url"></div>
  <p style="margin-top:1rem"><a id="manual" style="display:none">Перейти вручную →</a></p>
</div>
<script>
(async () => {
  const target = new URL(location.href);
  const path = target.searchParams.get('to') || target.hash.slice(1) || '/';
  try {
    const r = await fetch('./url.txt?t=' + Date.now(), {cache: 'no-store'});
    if (!r.ok) throw new Error('no url.txt');
    const url = (await r.text()).trim();
    if (!url || !url.startsWith('https://')) throw new Error('bad url');
    document.getElementById('url').textContent = url;
    document.getElementById('msg').textContent = 'Перенаправляем…';
    const dest = url.replace(/\/+$/, '') + path;
    const a = document.getElementById('manual');
    a.href = dest; a.style.display = 'inline';
    setTimeout(() => { location.replace(dest); }, 600);
  } catch (e) {
    document.getElementById('msg').innerHTML = 'Сайт временно недоступен.<br>Попробуйте через 30 секунд.';
  }
})();
</script>
</body>
</html>
